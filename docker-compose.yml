services:

  spark-master:
    image: apache/spark:3.5.1
    env_file:
      - .env
    container_name: spark-master
    hostname: spark-master
    # Runs the raw Java master class directly in the foreground
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "127.0.0.1:8080:8080"
      - "7077:7077"
    volumes:
      - ./jobs:/opt/spark/jobs
      - ./data:/data
      - ./benchmark:/opt/spark/benchmark
    networks:
      - data-network

  spark-worker-1:
    image: apache/spark:3.5.1
    env_file:
      - .env
    container_name: spark-worker-1
    hostname: spark-worker-1
    # Runs the raw Java worker class pointing to our master, setting resources with explicit flags
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077 -h spark-worker-1 -c 2 -m 3G
    volumes:
      - ./jobs:/opt/spark/jobs
      - ./data:/data
      - ./benchmark:/opt/spark/benchmark
    depends_on:
      - spark-master
    networks:
      - data-network

  spark-worker-2:
    image: apache/spark:3.5.1
    env_file:
      - .env
    container_name: spark-worker-2
    hostname: spark-worker-2
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077 -h spark-worker-2 -c 2 -m 3G
    volumes:
      - ./jobs:/opt/spark/jobs
      - ./data:/data
      - ./benchmark:/opt/spark/benchmark
    depends_on:
      - spark-master
    networks:
      - data-network

  clickhouse:
    image: clickhouse/clickhouse-server
    env_file:
      - .env
    container_name: clickhouse
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
    environment:
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      # Spark Parquet output mounted read-only
      - ./data/lake:/var/lib/clickhouse/user_files/lake:ro
      - ./olap/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - data-network

networks:
  data-network:

volumes:
  clickhouse-data:


